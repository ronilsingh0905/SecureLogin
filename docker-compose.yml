      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ronil0905
      JWT_SECRET: yourSuperSecretKeyForPrimeTradeAssignment2026SecureJwtKey
      JWT_EXPIRATION: 86400000