version: "3.8"

services:
  db:
    image: postgres:16
    container_name: secure-db
    environment:
      POSTGRES_DB: SecureLoginDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ronil0905
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
